<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeGovSwarm Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #00f2fe;
            }
            to {
                text-shadow: 0 0 20px #4facfe;
            }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #4facfe;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: #00f2fe;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #aaa;
        }

        .action-button {
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 1rem;
            width: 100%;
        }

        .action-button:hover {
            transform: scale(1.05);
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="container">
        <header class="header">
            <h1>DeGovSwarm Dashboard</h1>
            <p>Decentralized Governance Made Beautiful</p>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <h2>Governance Overview</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="proposal-count">23</div>
                        <div class="stat-label">Active Proposals</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="voter-count">1.2k</div>
                        <div class="stat-label">Active Voters</div>
                    </div>
                </div>
                <button class="action-button" onclick="viewProposals()">View Proposals</button>
            </div>

            <div class="card">
                <h2>Community Engagement</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="participant-count">5.6k</div>
                        <div class="stat-label">Participants</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="contribution-count">892</div>
                        <div class="stat-label">Contributions</div>
                    </div>
                </div>
                <button class="action-button" onclick="joinCommunity()">Join Community</button>
            </div>

            <div class="card">
                <h2>Swarm Analytics</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="swarm-size">142</div>
                        <div class="stat-label">Active Swarms</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="task-count">367</div>
                        <div class="stat-label">Open Tasks</div>
                    </div>
                </div>
                <button class="action-button" onclick="exploreSwarms()">Explore Swarms</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: "#ffffff" },
                shape: { type: "circle" },
                opacity: { value: 0.5, random: false },
                size: { value: 3, random: true },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: "#ffffff",
                    opacity: 0.4,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 6,
                    direction: "none",
                    random: false,
                    straight: false,
                    out_mode: "out",
                    bounce: false
                }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: true, mode: "repulse" },
                    onclick: { enable: true, mode: "push" },
                    resize: true
                }
            },
            retina_detect: true
        });

        function viewProposals() {
            alert("Redirecting to proposals page...");
        }

        function joinCommunity() {
            alert("Opening community portal...");
        }

        function exploreSwarms() {
            alert("Loading swarm explorer...");
        }

        // Add some simple animation to numbers
        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            const range = end - start;
            const minTimer = 50;
            const stepTime = Math.abs(Math.floor(duration / range));
            const startTime = new Date().getTime();
            const endTime = startTime + duration;
            let timer;

            function run() {
                const now = new Date().getTime();
                const remaining = Math.max((endTime - now) / duration, 0);
                const value = Math.round(end - (remaining * range));
                obj.innerHTML = value;
                if (value === end) {
                    clearInterval(timer);
                }
            }

            timer = setInterval(run, stepTime);
            run();
        }

        // Animate stats on page load
        window.onload = function() {
            animateValue("proposal-count", 0, 23, 1000);
            animateValue("voter-count", 0, 1200, 1500);
            animateValue("participant-count", 0, 5600, 2000);
            animateValue("contribution-count", 0, 892, 1500);
            animateValue("swarm-size", 0, 142, 1000);
            animateValue("task-count", 0, 367, 1500);
        };
    </script>
</body>
</html>
