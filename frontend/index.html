<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AICanary - AI Monitoring Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a;
            color: #e2e8f0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(45deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: #60a5fa;
        }

        .metric {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .chart-container {
            height: 200px;
            margin-top: 1rem;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }

        .status-healthy {
            background: #34d399;
            box-shadow: 0 0 10px #34d399;
        }

        .status-warning {
            background: #fbbf24;
            box-shadow: 0 0 10px #fbbf24;
        }

        .status-error {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">AICanary</h1>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <div class="card-header">
                    <span class="status-indicator status-healthy"></span>
                    System Health
                </div>
                <div class="metric">98.5%</div>
                <div class="chart-container">
                    <canvas id="healthChart"></canvas>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="status-indicator status-warning"></span>
                    Response Time
                </div>
                <div class="metric">245ms</div>
                <div class="chart-container">
                    <canvas id="responseChart"></canvas>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="status-indicator status-healthy"></span>
                    Model Accuracy
                </div>
                <div class="metric">94.2%</div>
                <div class="chart-container">
                    <canvas id="accuracyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        function createChart(ctx, label, data, color) {
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 12}, (_, i) => `${i}h`),
                    datasets: [{
                        label: label,
                        data: data,
                        borderColor: color,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: color + '20'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: '#e2e8f0'
                            }
                        },
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: '#e2e8f0'
                            }
                        }
                    }
                }
            });
        }

        // Initialize charts with sample data
        window.onload = () => {
            createChart(
                document.getElementById('healthChart'),
                'Health',
                [97, 98, 96, 98.5, 97.5, 98, 99, 98.5, 97, 98, 98.5, 98.5],
                '#34d399'
            );

            createChart(
                document.getElementById('responseChart'),
                'Response Time',
                [220, 235, 260, 245, 230, 255, 240, 245, 250, 235, 245, 245],
                '#fbbf24'
            );

            createChart(
                document.getElementById('accuracyChart'),
                'Accuracy',
                [93, 94, 93.5, 94.2, 94, 93.8, 94.5, 94.2, 93.9, 94.1, 94.2, 94.2],
                '#60a5fa'
            );
        };
    </script>
</body>
</html>
