<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitFlow-GPT - AI-Powered Code Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body class="bg-gray-900 text-white">
    <div id="confetti-canvas" class="fixed top-0 left-0 w-full h-full pointer-events-none"></div>
    
    <nav class="bg-gray-800 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="/assets/logo.svg" class="h-8 animate__animated animate__pulse animate__infinite" alt="GitFlow-GPT Logo">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">GitFlow-GPT</h1>
            </div>
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <span class="absolute -top-2 -right-2 bg-red-500 rounded-full px-2 py-1 text-xs">3</span>
                    <button class="p-2 hover:bg-gray-700 rounded-full">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    </button>
                </div>
                <div class="flex items-center bg-gray-700 rounded-full px-4 py-2">
                    <svg class="w-5 h-5 text-yellow-400 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                    <span class="font-bold">1,337</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">Your AI Analysis Progress</h2>
                    <div class="text-sm text-gray-400">Level 7</div>
                </div>
                <div class="relative pt-1">
                    <div class="flex mb-2 items-center justify-between">
                        <div>
                            <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full text-purple-600 bg-purple-200">Progress</span>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-semibold inline-block text-purple-600">73%</span>
                        </div>
                    </div>
                    <div class="overflow-hidden h-2 mb-4 text-xs flex rounded bg-purple-200">
                        <div style="width:73%" class="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-purple-500 animate-pulse"></div>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4 mt-6">
                    <div class="text-center">
                        <div class="text-2xl font-bold text-green-400">42</div>
                        <div class="text-sm text-gray-400">Files Analyzed</div>
                    </div>
                    <div class="text-center">
                        <div class="text-2xl font-bold text-blue-400">12</div>
                        <div class="text-sm text-gray-400">Issues Fixed</div>
                    </div>
                    <div class="text-center">
                        <div class="text-2xl font-bold text-purple-400">89%</div>
                        <div class="text-sm text-gray-400">Accuracy</div>
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-bold mb-6">Leaderboard</h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between bg-gray-700 p-3 rounded-lg animate__animated animate__fadeIn">
                        <div class="flex items-center space-x-3">
                            <div class="text-yellow-400 font-bold">1</div>
                            <img src="https://api.dicebear.com/6.x/avataaars/svg?seed=Felix" class="w-8 h-8 rounded-full" alt="User avatar">
                            <span>@codewizard</span>
                        </div>
                        <div class="font-bold text-yellow-400">2,445</div>
                    </div>
                    <div class="flex items-center justify-between bg-gray-700 p-3 rounded-lg">
                        <div class="flex items-center space-x-3">
                            <div class="text-gray-400 font-bold">2</div>
                            <img src="https://api.dicebear.com/6.x/avataaars/svg?seed=John" class="w-8 h-8 rounded-full" alt="User avatar">
                            <span>@devguru</span>
                        </div>
                        <div>2,342</div>
                    </div>
                    <div class="flex items-center justify-between bg-gray-700 p-3 rounded-lg">
                        <div class="flex items-center space-x-3">
                            <div class="text-orange-400 font-bold">3</div>
                            <img src="https://api.dicebear.com/6.x/avataaars/svg?seed=Sarah" class="w-8 h-8 rounded-full" alt="User avatar">
                            <span>@aicoder</span>
                        </div>
                        <div>2,265</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8">
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">Your Achievements</h2>
                    <button class="text-sm text-purple-400 hover:text-purple-300">View All</button>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="text-center p-4 bg-gray-700 rounded-lg transform hover:scale-105 transition-transform">
                        <div class="w-16 h-16 mx-auto mb-3 bg-purple-500 rounded-full flex items-center justify-center">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        <div class="font-bold">Speed Demon</div>
                        <div class="text-sm text-gray-400">Analyze 100 files in 1 hour</div>
                    </div>
                    <div class="text-center p-4 bg-gray-700 rounded-lg transform hover:scale-105 transition-transform">
                        <div class="w-16 h-16 mx-auto mb-3 bg-blue-500 rounded-full flex items-center justify-center">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <div class="font-bold">Bug Hunter</div>
                        <div class="text-sm text-gray-400">Fix 50 critical issues</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-4 right-4 flex space-x-2">
        <button onclick="shareProgress()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-full flex items-center space-x-2 transform hover:scale-105 transition-transform">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
            <span>Share Progress</span>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.4.0/dist/confetti.browser.min.js"></script>
    <script>
        function shareProgress() {
            // Trigger confetti animation
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });

            // Share to social media
            const text = "🚀 Just reached Level 7 on GitFlow-GPT! Fixed 12 issues with 89% accuracy. Join me in making code better with AI! #GitFlowGPT #coding";
            const url = 'https://gitflow-gpt.app';
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`);
        }

        // Add smooth animations for progress updates
        document.querySelectorAll('.animate-pulse').forEach(element => {
            element.addEventListener('transitionend', () => {
                element.classList.remove('animate-pulse');
                setTimeout(() => element.classList.add('animate-pulse'), 100);
            });
        });
    </script>
</body>
</html>
